<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1040" viewBox="0 0 1600 1040" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">a-certain-demo FTS ingestion architecture</title>
  <desc id="desc">FTS ingestion architecture focused on continuously storing ACL-attached documents into Discovery Engine Data Store using Cloud Run fetch, transform, and sync services.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 34px Arial, sans-serif; fill: #202124; }
      .subtitle { font: 16px Arial, sans-serif; fill: #5f6368; }
      .box { rx: 18; ry: 18; stroke-width: 2; }
      .edge { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .label { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .text { font: 15px Arial, sans-serif; fill: #334155; }
      .small { font: 13px Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1040" />
  <text class="title" x="60" y="60">FTS Ingestion Architecture (Data Store First)</text>
  <text class="subtitle" x="60" y="95">Cloud Run custom connector keeps syncing ACL-attached documents into Discovery Engine Data Store</text>

  <rect class="box" x="60" y="150" width="240" height="110" fill="#f8fbff" stroke="#5f9df7" />
  <text class="label" x="85" y="190">FTS Scope Note</text>
  <text class="text" x="85" y="222">End-user query layer</text>
  <text class="text" x="85" y="246">is out of scope here</text>

  <rect class="box" x="330" y="130" width="210" height="150" fill="#e8f0fe" stroke="#1a73e8" />
  <text class="label" x="350" y="170">Discovery Engine API</text>
  <text class="text" x="350" y="202">import / update documents</text>
  <text class="text" x="350" y="226">with ACL metadata</text>
  <text class="text" x="350" y="250">managed Google Cloud service</text>

  <rect class="box" x="560" y="130" width="210" height="150" fill="#dbeafe" stroke="#4285f4" />
  <text class="label" x="580" y="170">Data Store</text>
  <text class="text" x="580" y="202">documents + chunks</text>
  <text class="text" x="580" y="226">ACL fields + metadata</text>
  <text class="text" x="580" y="250">kept fresh by sync jobs</text>

  <rect class="box" x="820" y="130" width="300" height="150" fill="#fef7e0" stroke="#fbbc04" />
  <text class="label" x="815" y="170">Okta / LDAP / Azure AD</text>
  <text class="text" x="815" y="202">identity and group source</text>
  <text class="text" x="815" y="226">for ACL mapping</text>
  <text class="small" x="815" y="250">sub, groups, department, region, position, managerId</text>

  <rect class="box" x="250" y="360" width="360" height="180" fill="#e6f4ea" stroke="#34a853" />
  <text class="label" x="275" y="400">Cloud Run: Fetch Service</text>
  <text class="text" x="275" y="432">Fetch: REST API / SOAP / Microsoft Graph</text>
  <text class="text" x="275" y="458">connector auth + resilient retries</text>
  <text class="text" x="275" y="484">source payload collection</text>
  <text class="text" x="275" y="510">sends raw docs to Transform</text>

  <rect class="box" x="650" y="360" width="360" height="180" fill="#e8f0fe" stroke="#1a73e8" />
  <text class="label" x="675" y="400">Cloud Run: Transform Service</text>
  <text class="text" x="675" y="432">normalize into Discovery Engine schema</text>
  <text class="text" x="675" y="458">attach ACL fields (group / user / org attrs)</text>
  <text class="text" x="675" y="484">enrich metadata and document ids</text>
  <text class="text" x="675" y="510">prepare upsert payload for Data Store</text>

  <rect class="box" x="1080" y="360" width="220" height="120" fill="#f8f9fa" stroke="#9aa0a6" />
  <text class="label" x="1105" y="400">Secret Manager</text>
  <text class="text" x="1105" y="432">OIDC secret</text>
  <text class="text" x="1105" y="456">provider tokens</text>

  <rect class="box" x="1330" y="330" width="220" height="100" fill="#fce8e6" stroke="#ea4335" />
  <text class="label" x="1355" y="370">Cloud Run Sync Worker</text>
  <text class="text" x="1355" y="398">continuous ingest scheduler</text>

  <rect class="box" x="1330" y="450" width="220" height="110" fill="#fce8e6" stroke="#ea4335" />
  <text class="label" x="1355" y="490">Sync State / ACL Cache</text>
  <text class="text" x="1355" y="518">checkpoint + provider normalization</text>
  <text class="text" x="1355" y="542">batch + periodic sync state</text>

  <rect class="box" x="60" y="620" width="260" height="100" fill="#ffffff" stroke="#dadce0" />
  <text class="label" x="90" y="660">ServiceNow</text>
  <text class="text" x="90" y="688">tickets / KB</text>

  <rect class="box" x="360" y="620" width="260" height="100" fill="#ffffff" stroke="#dadce0" />
  <text class="label" x="390" y="660">Workday</text>
  <text class="text" x="390" y="688">HR / payroll</text>

  <rect class="box" x="660" y="620" width="260" height="100" fill="#ffffff" stroke="#dadce0" />
  <text class="label" x="690" y="660">Compliance System</text>
  <text class="text" x="690" y="688">audit / rules</text>

  <rect class="box" x="960" y="620" width="260" height="100" fill="#ffffff" stroke="#dadce0" />
  <text class="label" x="990" y="660">SharePoint</text>
  <text class="text" x="990" y="688">docs / policies</text>

  <rect class="box" x="1260" y="620" width="260" height="100" fill="#ffffff" stroke="#dadce0" />
  <text class="label" x="1290" y="660">Confluence</text>
  <text class="text" x="1290" y="688">runbooks / design notes</text>

  <rect class="box" x="1330" y="530" width="220" height="60" fill="#ffffff" stroke="#dadce0" />
  <text class="label" x="1355" y="568">Audit / Index</text>

  <path class="edge" d="M300 205 H330" />
  <path class="edge" d="M540 205 H560" />
  <path class="edge" d="M770 205 H820" />
  <path class="edge" d="M1090 205 H1130" />
  <path class="edge" d="M440 280 V360" />
  <path class="edge" d="M660 280 V360" />
  <path class="edge" d="M830 280 V360 H1010" />
  <path class="edge" d="M1200 390 H1330" />
  <path class="edge" d="M1440 430 V450" />
  <path class="edge" d="M1440 430 V620 H190" />
  <path class="edge" d="M1440 430 V620 H490" />
  <path class="edge" d="M1440 430 V620 H790" />
  <path class="edge" d="M1440 430 V620 H1090" />
  <path class="edge" d="M1440 430 V620 H1390" />

  <text class="small" x="370" y="118">sync target API</text>
  <text class="small" x="593" y="118">index target</text>
  <text class="small" x="848" y="118">ACL identity attributes</text>
  <text class="small" x="818" y="294">groups and org claims</text>
  <text class="small" x="565" y="330">Cloud Run Fetch path</text>
  <text class="small" x="715" y="344">Cloud Run Transform path</text>
  <text class="small" x="1035" y="338">static secrets only</text>
  <text class="small" x="1360" y="586">Cloud Run Sync path</text>
  <text class="small" x="1360" y="604">5 downstream systems</text>

  <rect x="60" y="790" width="1500" height="180" rx="18" ry="18" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
  <text class="label" x="90" y="830">Data Store ACL Payload</text>
  <text class="text" x="90" y="865">Identity attributes for ACL mapping: groups, department, region, position, managerId</text>
  <text class="text" x="90" y="895">Document metadata for filtering: allowed_groups, allowed_departments, allowed_regions, allowed_positions, allowed_manager_ids, allowed_user_subs</text>
  <text class="text" x="90" y="925">Main objective in this scope: keep Data Store continuously updated with ACL-attached documents.</text>
  <text class="text" x="90" y="955">End-user query and answer generation flow is intentionally out of scope in this FTS diagram.</text>
</svg>
