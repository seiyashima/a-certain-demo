<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Enterprise Mock | a-certain-demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-mode="mock">
    <main class="app-shell">
      <aside class="rail" aria-label="navigation rail">
        <button id="new-chat-button" class="rail-button" type="button" aria-label="new chat">✎</button>
        <button class="rail-button rail-button-active" type="button" aria-label="mock mode">✦</button>
        <button class="rail-button" type="button" aria-label="settings">⚙</button>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div class="brand-wrap">
            <div class="brand-title-row">
              <h1 class="brand-title">Gemini Enterprise</h1>
              <span class="brand-badge">標準</span>
            </div>
            <p class="brand-subtitle">Gemini Enterprise モック</p>
          </div>

          <div class="topbar-actions">
            <div class="user-menu">
              <button id="avatar-button" class="avatar-button" type="button" aria-label="user profile" aria-expanded="false">
                <span id="avatar-initials">JS</span>
              </button>
              <div id="profile-panel" class="profile-panel" hidden>
                <label class="profile-picker" for="demo-profile">
                  <span>ログインユーザ</span>
                  <select id="demo-profile"></select>
                </label>
              </div>
            </div>
          </div>
        </header>

        <section id="mock-view" class="mock-view" aria-label="Gemini Enterprise mock">
          <div class="mock-main">
            <div class="mock-hero">
              <p class="greeting-line" id="mock-greeting">こんにちは、 Seiya さん</p>
              <h2 id="mock-title">何から始めますか?</h2>
            </div>

            <div class="composer-shell">
              <div class="composer-row">
                <span class="composer-icon" aria-hidden="true">🛡</span>
                <input id="mock-query" type="text" placeholder="質問したり、データを検索したりできます。@mention や /tools を使用することも可能です" />
              </div>
              <div class="composer-footer">
                <div class="composer-tools">
                  <button class="icon-tool" type="button" aria-label="add">＋</button>
                  <button class="icon-tool" type="button" aria-label="options">⚙</button>
                  <button id="mock-connector-toggle" class="icon-tool is-active" type="button" aria-expanded="false" aria-label="connector selection">◫</button>
                  <div id="mock-connector-menu" class="connector-menu" hidden>
                    <label class="connector-menu-all">
                      <input id="mock-select-all-connectors" type="checkbox" checked />
                      <span>すべてのコネクタを有効にする</span>
                    </label>
                    <div id="mock-connector-options" class="connector-menu-options"></div>
                    <p id="mock-connector-summary" class="connector-menu-summary">5 systems selected</p>
                  </div>
                </div>
                <button id="mock-send" class="send-button" type="button">▶</button>
              </div>
            </div>

            <section class="shortcut-block" aria-label="shortcuts">
              <div class="shortcut-head">
                <span>ショートカット</span>
                <span class="shortcut-link">↗</span>
              </div>
              <div id="mock-shortcuts" class="shortcut-pills"></div>
            </section>
          </div>
        </section>

        <section class="thread-shell" aria-label="mock conversation">
          <div class="thread-card">
            <div class="thread-head">
              <div>
                <p class="section-label dark">Mock chat</p>
                <h2>回答エリア</h2>
              </div>
              <span id="mock-status" class="status-pill" data-status="idle">idle</span>
            </div>

            <div id="mock-messages" class="mock-messages"></div>
          </div>
        </section>

        <footer class="footer">
          <small>Health endpoint: <code>/healthz</code></small>
        </footer>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
